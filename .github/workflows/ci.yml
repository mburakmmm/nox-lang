name: CI

# Faz Q.2 (bkz. docs/uretim-hazirlik-analizi.md): her push/PR'da `zig build
# test`i HEM Debug HEM ReleaseFast modunda çalıştırır.
#
# Faz R.1/R.2/R.3: `runtime/async_rt` artık aarch64 VE x86-64'ü, macOS VE
# Linux'u destekliyor (bkz. spec §3.8-§3.10) — matris ÜÇ GERÇEK kombinasyonu
# kapsıyor: macOS/aarch64 (Apple Silicon), Linux/x86-64 (GitHub'ın standart
# `ubuntu-latest` runner'ı — bu, Faz R.2'nin x86-64 fiber kodunun yalnızca
# YEREL Rosetta çevirisiyle DEĞİL GERÇEK donanımda da doğrulanmasını sağlar),
# Linux/aarch64 (`ubuntu-24.04-arm`). Linux'ta `qbe` Homebrew'de OLMADIĞINDAN
# KAYNAKTAN derlenir (bkz. `qbe-source` adımı — Faz R.3'ün Docker doğrulaması
# SIRASINDA GERÇEKTEN keşfedilen bir hata: kaynaktan derlenen bir `qbe`nin
# BUILD-TIME varsayılan hedefi macOS'un Homebrew paketinden FARKLIDIR, bu
# YÜZDEN `compiler/qbe_target.zig` `-t`yi HER ZAMAN AÇIKÇA geçer).
#
# **Zig kurulumu — `mlugg/setup-zig@v1` KULLANILMAZ (Faz CC.1'in ARDINDAN
# GERÇEKTEN keşfedilen bir hata):** o eylem, GERÇEK/etiketli bir sürüm
# (`"0.16.0"`, dev-snapshot DEĞİL) İÇİN "official" yedek URL'sini HER ZAMAN
# `ziglang.org/builds/...` OLARAK KURAR — bu yol SADECE `master` dev-
# snapshot'ları İÇİN doğrudur, GERÇEK etiketli sürümler `ziglang.org/
# download/<sürüm>/...` altındadır (ziglang.org'un KENDİ `download/index.
# json`ıyla DOĞRULANDI). Sonuç: TÜM mirror'lar + "official" 404/503 İLE
# başarısız oluyordu (`Zig 0.16.0 fetch` adımı, ~1 dakikada ÇÖKÜYORDU) —
# bu bir Zig/ağ kesintisi DEĞİLDİ. Düzeltme: doğru URL'den DOĞRUDAN indirip
# `$GITHUB_PATH`a eklemek.
#
# **`zig build test`den ÖNCE AYRI, TAM bir `zig build` adımı — GERÇEK,
# TEKRARLANABİLİR bir "soğuk önbellek" yarış durumu KEŞFEDİLDİ:** `.zig-
# cache`/`zig-out` TAMAMEN TEMİZ (`rm -rf`) bir durumdan `zig build test`
# DOĞRUDAN çalıştırıldığında, `noxc`/`noxlsp`yi bir ALT SÜREÇ olarak
# ÇAĞIRAN test dosyaları (`tests/cli/*.zig`) ARA SIRA `processSpawnPosix`
# İLE ÇÖKÜYORDU — `noxc`nin KENDİSİ HENÜZ tam olarak kurulmamışken (`zig
# build test`in KENDİ iç `install_noxc`/`install_noxrt` adımlarının
# TAMAMLANMASI İLE test ikililerinin bu kurulu ikiliyi ÇAĞIRMASI ARASINDA
# bir yarış — `test_step.dependOn(&install_noxc.step)` GİBİ Step-seviyesi
# bağımlılıklar DOĞRU KURULU olsa BİLE). Yerel olarak `rm -rf .zig-cache
# zig-out && zig build test` İLE %100 TEKRARLANABİLİR şekilde DOĞRULANDI
# (hatta `noxc`/`noxlsp`ye HİÇ dokunmayan `lsp_test.zig` BİLE etkilendi).
# **Düzeltme (yerel olarak `zig build` (TAM kurulum) SONRA `zig build
# test` İKİ AYRI komut olarak çalıştırılınca sorunun TAMAMEN ORTADAN
# KALKTIĞI doğrulandı):** her mod (Debug/ReleaseFast) İÇİN önce SALT
# `zig build` (o `-Doptimize` İLE), SONRA `zig build test` (AYNI mod) —
# ikinci komut çalıştığında `install_noxc`/`install_noxrt` ZATEN
# TAMAMLANMIŞ/önbelleklenmiş OLDUĞUNDAN yarış PENCERESİ tamamen KAPANIR.
#
# Faz LL (bkz. nox-teknik-spesifikasyon.md §3.71): YUKARIDAKİ 3-platform
# matrisinin YANINDA (İÇİNDE DEĞİL) AYRI bir `windows-frontend` işi VAR.
# LL.1 yalnızca derleyici ön-ucunu doğruluyordu; LL.2-LL.5 runtime'ın
# TAMAMINI (fiber/reaktör/soket/self-pipe) Windows'a taşıdı; LL.6 artık
# `qbe`yi KAYNAKTAN derleyip GERÇEK bir Nox programını uçtan uca (`noxc
# run`) ÇALIŞTIRIYOR — bu işin ADI ("yalnızca derleyici ön-ucu — Faz
# LL.1") artık TARİHSEL, kapsamı bundan ÇOK DAHA GENİŞ (LL.8'de, TÜM
# roadmap bitince güncellenecek).

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS (aarch64)
            zig_arch: aarch64-macos
          - os: ubuntu-latest
            name: Linux (x86-64)
            zig_arch: x86_64-linux
          - os: ubuntu-24.04-arm
            name: Linux (aarch64)
            zig_arch: aarch64-linux
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Zig kur
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/zig.tar.xz "https://ziglang.org/download/0.16.0/zig-${{ matrix.zig_arch }}-0.16.0.tar.xz"
          tar xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-${{ matrix.zig_arch }}-0.16.0" >>"$GITHUB_PATH"

      - name: qbe kur (macOS)
        if: runner.os == 'macOS'
        run: brew install qbe

      - name: qbe kur (Linux — kaynaktan derle)
        if: runner.os == 'Linux'
        run: |
          curl -sSL -o /tmp/qbe.tar.xz https://c9x.me/compile/release/qbe-1.3.tar.xz
          tar xf /tmp/qbe.tar.xz -C /tmp
          make -C /tmp/qbe-1.3 -j"$(nproc)"
          sudo cp /tmp/qbe-1.3/qbe /usr/local/bin/qbe

      - name: zig build (Debug)
        run: zig build

      - name: zig build test (Debug)
        run: zig build test

      - name: zig build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: zig build test (ReleaseFast)
        run: zig build test -Doptimize=ReleaseFast

  # Faz LL.1 (bkz. nox-teknik-spesifikasyon.md §3.71): GERÇEK Windows
  # desteği YOK — `runtime/async_rt/io_reactor.zig` şu an yalnızca macOS
  # (kqueue) VE Linux (epoll) uyguluyor (dosya-seviyesi bir `comptime`
  # `@compileError`, bkz. LL.2+). AMA `noxc`/`noxlsp` (derleyicinin
  # KENDİSİ) HİÇBİR POSIX-özgü çağrı (`std.posix.*`/`std.c.*`)
  # İÇERMEDİĞİNDEN, `build.zig`nin `noxc` adımı (runtime'a/`noxrt`e HİÇ
  # BAĞIMLI DEĞİL — bkz. o adımın belge notu) VE `compiler/lib.zig`nin
  # (lexer/parser/checker/module_loader) testleri (`frontend-test` adımı)
  # native Windows'ta İLKE OLARAK çalışabilir olmalı. Bu iş TAM OLARAK bu
  # iddiayı GERÇEK bir `windows-latest` çalıştırıcısında doğrular — ana
  # 3-platform matrisinin YANINDA, İÇİNDE DEĞİL (o matrisin TAMAMI —
  # `qbe`/`cc` gerektiren `build`/`test` adımları dahil — Windows'ta HENÜZ
  # ÇALIŞMAZ, bkz. LL.2-LL.7 yol haritası).
  windows-frontend:
    name: Windows (yalnızca derleyici ön-ucu — Faz LL.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zig kur
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip" -OutFile "$env:RUNNER_TEMP\zig.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\zig.zip" -DestinationPath "$env:RUNNER_TEMP"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:RUNNER_TEMP\zig-x86_64-windows-0.16.0"

      - name: zig build noxc (yalnızca derleyici ön-ucu + stdlib)
        run: zig build noxc

      - name: zig build frontend-test (yalnızca lexer/parser/checker testleri)
        run: zig build frontend-test

      - name: Duman testi — noxc.exe check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Content -Path smoke.nox -Value "print(1)" -NoNewline
          & ".\zig-out\bin\noxc.exe" check smoke.nox
          if ($LASTEXITCODE -ne 0) { throw "noxc check basarisiz (exit $LASTEXITCODE)" }

      # Faz LL.2/LL.3 (bkz. nox-teknik-spesifikasyon.md §3.71): `cc`/`gcc`
      # (MinGW-w64) `windows-latest`te VARSAYILAN olarak `C:\mingw64\bin`
      # altında PATH'te BULUNDUĞU (GERÇEK bir keşif adımıyla DOĞRULANDI,
      # commit geçmişine bkz.) — `build.zig`nin `compile_swap_asm` adımı
      # (QBE'nin AT&T assembly'sini `cc -c` İLE derleyen) BU YÜZDEN
      # native windows-latest'te ÇALIŞABİLİR. `async-rt-test` adımı, TÜM
      # `noxrt`in (dolayısıyla HENÜZ Windows'a taşınmamış TÜM stdlib_shims'in)
      # BEKLENMESİNE GEREK KALMADAN, YALNIZCA fiber/io_reactor/scheduler/
      # channel katmanının (Windows x64 fiber assembly'si + `WSAPoll`
      # tabanlı reaktör DAHİL) GERÇEKTEN native Windows'ta ÇALIŞTIĞINI
      # doğrular (bkz. o build.zig adımının belge notu, "runtime/
      # stdlib_shims'e hiç bağımlı değil").
      - name: zig build async-rt-test (yalnızca fiber/io_reactor/scheduler/channel)
        run: zig build async-rt-test

      # Faz LL.4 SONRASI keşif (bkz. nox-teknik-spesifikasyon.md §3.71):
      # `fs.zig` (LL.4'te taşındı) `http_client.zig`yi (dupeToNoxStr İçin,
      # LL.5'in KENDİ kapsamı, HENÜZ taşınmadı) İÇE AKTARDIĞINDAN,
      # `fs.zig`nin GERÇEKTEN derlendiğini İZOLE olarak doğrulamanın YOLU
      # YOK — bu YÜZDEN TAM `noxrt.o`yu (dolayısıyla TÜM stdlib_shims'i)
      # derlemeyi DENEYİP GERÇEKTEN NE KADARININ ZATEN çalıştığını (birçok
      # soket fonksiyonu/tipi Zig'in KENDİ switch'lerinde Windows İçin
      # ZATEN case'li — `continue-on-error` İLE, henüz TAM yeşil
      # BEKLENMİYOR, yalnızca GERÇEK hata yüzeyini GÖRMEK İçin).
      # Faz LL.5 SONRASI (bkz. nox-teknik-spesifikasyon.md §3.71): artık
      # TAM olarak yeşil BEKLENİYOR (`continue-on-error` KALDIRILDI) —
      # runtime'ın TAMAMI (HPy köprüsü DAHİL) GERÇEK Windows CI'de bir
      # KEZ zaten sıfır hatayla doğrulandı.
      - name: zig build (TAM — noxrt.o dahil runtime)
        run: zig build

      # Faz LL.6 (bkz. nox-teknik-spesifikasyon.md §3.71): `qbe`nin Windows
      # İçin ÖNCEDEN derlenmiş bir paketi YOK (macOS'un Homebrew'ü/Linux'un
      # paket yöneticisi gibi) — Linux CI'nin KENDİ "kaynaktan derle" deseni
      # (yukarısı) İZLENİR, TEK farkla: `make` yerine DOĞRUDAN `cc` (MinGW'in
      # `cc`si) — QBE'nin Makefile'ı POSIX `sh`/`case`/`uname`e GÜVENİR,
      # PowerShell'de GÜVENİLİR ÇALIŞMAZ. **İlk girişimde GERÇEK CI'de
      # bulunan 2 hata:** (1) `main.o: config.h` — Makefile'ın `config.h`
      # kuralı yalnızca TEK bir `#define Deftgt ...` SATIRI üretiyor (bir
      # derleme-zamanı VARSAYILAN hedef — `compiler/qbe_target.zig` zaten
      # `-t`yi HER ZAMAN AÇIKÇA geçtiğinden bu değerin KENDİSİ ÖNEMLİ
      # DEĞİL, dosyanın SADECE VAR OLMASI yeterli); (2) kaynaklar TEK bir
      # dizinde DEĞİL — `amd64/`/`arm64/`/`rv64/` alt dizinlerindeki
      # backend dosyaları da (Makefile'ın `AMD64OBJ`/`ARM64OBJ`/`RV64OBJ`
      # listeleri) DERLENMELİ, yalnızca üst dizindeki `*.c` YETERSİZ.
      # **Faz LL.6 — QBE 1.3'ün amd64_win backend'inde GERÇEK bir upstream
      # hatası bulundu (kaynak koduna bakılarak, sonra macOS'ta derlenip
      # assembly çıktısı incelenerek DOĞRULANDI — bkz. nox-teknik-
      # spesifikasyon.md §3.71):** `amd64/winabi.c`nin `lower_func_
      # parameters`ı, YIĞINDAN (stack'ten) geçirilen bir parametreyi
      # yüklerken (`APS_InlineOnStack`, struct OLMAYAN dal) sınıfı HER ZAMAN
      # `Kl` (64-bit TAMSAYI) olarak SABİTLİYOR — parametre GERÇEKTE bir
      # `f64` İSE, bu YÜKLEME bir tamsayı yazmacına (`%r10` gibi) yapılıyor,
      # AMA DEĞER SONRADAN `movsd` (yalnızca XMM yazmaçlarını KABUL EDEN bir
      # SSE komutu) İLE kullanılınca `cc: ... Error: operand type mismatch
      # for 'movsd'` İLE bağlayıcı/assembler HATASI VERİYOR (`JsonValue.
      # __init__`in `n: f64` alanı — HER Nox programı `stdlib/nox/core.
      # nox`u KOŞULSUZ merge ettiğinden, HATA `print(1)` KADAR basit bir
      # programda BİLE tetiklenir). Düzeltme TEK satır: `Kl` yerine `instr->
      # cls` (parametrenin GERÇEK sınıfı — `APS_Register` dalının ZATEN
      # doğru yaptığı gibi).
      - name: qbe kur (Windows — kaynaktan, dogrudan cc ile derle)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://c9x.me/compile/release/qbe-1.3.tar.xz" -OutFile "$env:RUNNER_TEMP\qbe.tar.xz"
          tar xf "$env:RUNNER_TEMP\qbe.tar.xz" -C "$env:RUNNER_TEMP"
          Push-Location "$env:RUNNER_TEMP\qbe-1.3"
          Set-Content -Path config.h -Value "#define Deftgt T_amd64_win"
          $winabi = Get-Content -Path "amd64\winabi.c" -Raw
          $needle = "emit(Ocopy, Kl, instr->to, SLOT(-slot_offset), R);"
          if (-not $winabi.Contains($needle)) { throw "qbe amd64_win yamasi: beklenen satir bulunamadi (upstream degismis olabilir)" }
          $winabi = $winabi.Replace($needle, "emit(Ocopy, instr->cls, instr->to, SLOT(-slot_offset), R);")
          Set-Content -Path "amd64\winabi.c" -Value $winabi -NoNewline
          cc -O2 -std=c99 -o qbe.exe *.c amd64/*.c arm64/*.c rv64/*.c
          if ($LASTEXITCODE -ne 0) { throw "qbe derlemesi basarisiz (exit $LASTEXITCODE)" }
          Pop-Location
          Copy-Item "$env:RUNNER_TEMP\qbe-1.3\qbe.exe" "$env:RUNNER_TEMP\qbe.exe"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:RUNNER_TEMP"

      # Faz LL.6 — GERÇEK bir Nox programının uçtan uca (lex→parse→check→
      # codegen→qbe→cc→çalıştır) Windows'ta ÇALIŞTIĞININ İLK doğrulaması.
      # `subcommand_test.zig`nin AYNI deseni: exit code 0 VE stdout'un
      # BEKLENEN metni İÇERMESİ ayrı ayrı kontrol edilir (Nox programının
      # KENDİSİ `process.exit` ÇAĞIRMADIĞI SÜRECE çıkış kodu HER ZAMAN 0'dır
      # — `print`in bastığı değer ASLA çıkış koduna YANSIMAZ).
      # Faz LL.6 keşif: `noxrt.o`nun GERÇEKTEN var/doğru boyutta OLDUĞUNU VE
      # beklenen sembolleri İÇERDİĞİNİ (MinGW'in KENDİ `nm`ı ile) doğrudan
      # doğrular — bir SONRAKİ "undefined reference" hatasının KÖK NEDENİNİ
      # (dosya eksik mi, sembol GERÇEKTEN yok mu, yoksa başka bir şey mi)
      # TAHMİN ETMEDEN GÖRMEK İçin.
      - name: Keşif — noxrt.o var mi, beklenen semboller var mi
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Stop"
          Get-Item "zig-out\lib\noxrt.o" | Format-List Name, Length
          nm "zig-out\lib\noxrt.o" | Select-String "nox_alloc|nox_runtime_init|nox_str_free_now" | Select-Object -First 20

      - name: Duman testi — noxc.exe run (gercek qbe+cc baglama)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Content -Path run_smoke.nox -Value "print(21 + 21)" -NoNewline
          $output = & ".\zig-out\bin\noxc.exe" run run_smoke.nox
          if ($LASTEXITCODE -ne 0) { throw "noxc run basarisiz (exit $LASTEXITCODE): $output" }
          if ($output -ne "42") { throw "noxc run yanlis cikti: '$output' (beklenen '42')" }
