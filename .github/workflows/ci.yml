name: CI

# Faz Q.2 (bkz. docs/uretim-hazirlik-analizi.md): her push/PR'da `zig build
# test`i HEM Debug HEM ReleaseFast modunda çalıştırır.
#
# Faz R.1/R.2/R.3: `runtime/async_rt` artık aarch64 VE x86-64'ü, macOS VE
# Linux'u destekliyor (bkz. spec §3.8-§3.10) — matris ÜÇ GERÇEK kombinasyonu
# kapsıyor: macOS/aarch64 (Apple Silicon), Linux/x86-64 (GitHub'ın standart
# `ubuntu-latest` runner'ı — bu, Faz R.2'nin x86-64 fiber kodunun yalnızca
# YEREL Rosetta çevirisiyle DEĞİL GERÇEK donanımda da doğrulanmasını sağlar),
# Linux/aarch64 (`ubuntu-24.04-arm`). Linux'ta `qbe` Homebrew'de OLMADIĞINDAN
# KAYNAKTAN derlenir (bkz. `qbe-source` adımı — Faz R.3'ün Docker doğrulaması
# SIRASINDA GERÇEKTEN keşfedilen bir hata: kaynaktan derlenen bir `qbe`nin
# BUILD-TIME varsayılan hedefi macOS'un Homebrew paketinden FARKLIDIR, bu
# YÜZDEN `compiler/qbe_target.zig` `-t`yi HER ZAMAN AÇIKÇA geçer).
#
# **Zig kurulumu — `mlugg/setup-zig@v1` KULLANILMAZ (Faz CC.1'in ARDINDAN
# GERÇEKTEN keşfedilen bir hata):** o eylem, GERÇEK/etiketli bir sürüm
# (`"0.16.0"`, dev-snapshot DEĞİL) İÇİN "official" yedek URL'sini HER ZAMAN
# `ziglang.org/builds/...` OLARAK KURAR — bu yol SADECE `master` dev-
# snapshot'ları İÇİN doğrudur, GERÇEK etiketli sürümler `ziglang.org/
# download/<sürüm>/...` altındadır (ziglang.org'un KENDİ `download/index.
# json`ıyla DOĞRULANDI). Sonuç: TÜM mirror'lar + "official" 404/503 İLE
# başarısız oluyordu (`Zig 0.16.0 fetch` adımı, ~1 dakikada ÇÖKÜYORDU) —
# bu bir Zig/ağ kesintisi DEĞİLDİ. Düzeltme: doğru URL'den DOĞRUDAN indirip
# `$GITHUB_PATH`a eklemek.
#
# **`zig build test`den ÖNCE AYRI, TAM bir `zig build` adımı — GERÇEK,
# TEKRARLANABİLİR bir "soğuk önbellek" yarış durumu KEŞFEDİLDİ:** `.zig-
# cache`/`zig-out` TAMAMEN TEMİZ (`rm -rf`) bir durumdan `zig build test`
# DOĞRUDAN çalıştırıldığında, `noxc`/`noxlsp`yi bir ALT SÜREÇ olarak
# ÇAĞIRAN test dosyaları (`tests/cli/*.zig`) ARA SIRA `processSpawnPosix`
# İLE ÇÖKÜYORDU — `noxc`nin KENDİSİ HENÜZ tam olarak kurulmamışken (`zig
# build test`in KENDİ iç `install_noxc`/`install_noxrt` adımlarının
# TAMAMLANMASI İLE test ikililerinin bu kurulu ikiliyi ÇAĞIRMASI ARASINDA
# bir yarış — `test_step.dependOn(&install_noxc.step)` GİBİ Step-seviyesi
# bağımlılıklar DOĞRU KURULU olsa BİLE). Yerel olarak `rm -rf .zig-cache
# zig-out && zig build test` İLE %100 TEKRARLANABİLİR şekilde DOĞRULANDI
# (hatta `noxc`/`noxlsp`ye HİÇ dokunmayan `lsp_test.zig` BİLE etkilendi).
# **Düzeltme (yerel olarak `zig build` (TAM kurulum) SONRA `zig build
# test` İKİ AYRI komut olarak çalıştırılınca sorunun TAMAMEN ORTADAN
# KALKTIĞI doğrulandı):** her mod (Debug/ReleaseFast) İÇİN önce SALT
# `zig build` (o `-Doptimize` İLE), SONRA `zig build test` (AYNI mod) —
# ikinci komut çalıştığında `install_noxc`/`install_noxrt` ZATEN
# TAMAMLANMIŞ/önbelleklenmiş OLDUĞUNDAN yarış PENCERESİ tamamen KAPANIR.
#
# Faz LL.1 (bkz. nox-teknik-spesifikasyon.md §3.71): YUKARIDAKİ 3-platform
# matrisinin YANINDA (İÇİNDE DEĞİL) AYRI bir `windows-frontend` işi VAR —
# yalnızca `noxc`/`noxlsp`nin (runtime'a HİÇ bağımlı olmayan derleyici
# ön-ucunun) native Windows'ta derlenip ÇALIŞTIĞINI doğrular. GERÇEK
# Windows desteği (runtime/`nox build`/`nox test`) HENÜZ YOK.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS (aarch64)
            zig_arch: aarch64-macos
          - os: ubuntu-latest
            name: Linux (x86-64)
            zig_arch: x86_64-linux
          - os: ubuntu-24.04-arm
            name: Linux (aarch64)
            zig_arch: aarch64-linux
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Zig kur
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/zig.tar.xz "https://ziglang.org/download/0.16.0/zig-${{ matrix.zig_arch }}-0.16.0.tar.xz"
          tar xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-${{ matrix.zig_arch }}-0.16.0" >>"$GITHUB_PATH"

      - name: qbe kur (macOS)
        if: runner.os == 'macOS'
        run: brew install qbe

      - name: qbe kur (Linux — kaynaktan derle)
        if: runner.os == 'Linux'
        run: |
          curl -sSL -o /tmp/qbe.tar.xz https://c9x.me/compile/release/qbe-1.3.tar.xz
          tar xf /tmp/qbe.tar.xz -C /tmp
          make -C /tmp/qbe-1.3 -j"$(nproc)"
          sudo cp /tmp/qbe-1.3/qbe /usr/local/bin/qbe

      - name: zig build (Debug)
        run: zig build

      - name: zig build test (Debug)
        run: zig build test

      - name: zig build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: zig build test (ReleaseFast)
        run: zig build test -Doptimize=ReleaseFast

  # Faz LL.1 (bkz. nox-teknik-spesifikasyon.md §3.71): GERÇEK Windows
  # desteği YOK — `runtime/async_rt/io_reactor.zig` şu an yalnızca macOS
  # (kqueue) VE Linux (epoll) uyguluyor (dosya-seviyesi bir `comptime`
  # `@compileError`, bkz. LL.2+). AMA `noxc`/`noxlsp` (derleyicinin
  # KENDİSİ) HİÇBİR POSIX-özgü çağrı (`std.posix.*`/`std.c.*`)
  # İÇERMEDİĞİNDEN, `build.zig`nin `noxc` adımı (runtime'a/`noxrt`e HİÇ
  # BAĞIMLI DEĞİL — bkz. o adımın belge notu) VE `compiler/lib.zig`nin
  # (lexer/parser/checker/module_loader) testleri (`frontend-test` adımı)
  # native Windows'ta İLKE OLARAK çalışabilir olmalı. Bu iş TAM OLARAK bu
  # iddiayı GERÇEK bir `windows-latest` çalıştırıcısında doğrular — ana
  # 3-platform matrisinin YANINDA, İÇİNDE DEĞİL (o matrisin TAMAMI —
  # `qbe`/`cc` gerektiren `build`/`test` adımları dahil — Windows'ta HENÜZ
  # ÇALIŞMAZ, bkz. LL.2-LL.7 yol haritası).
  windows-frontend:
    name: Windows (yalnızca derleyici ön-ucu — Faz LL.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zig kur
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip" -OutFile "$env:RUNNER_TEMP\zig.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\zig.zip" -DestinationPath "$env:RUNNER_TEMP"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:RUNNER_TEMP\zig-x86_64-windows-0.16.0"

      - name: zig build noxc (yalnızca derleyici ön-ucu + stdlib)
        run: zig build noxc

      - name: zig build frontend-test (yalnızca lexer/parser/checker testleri)
        run: zig build frontend-test

      - name: Duman testi — noxc.exe check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-Content -Path smoke.nox -Value "x: int = 1`nprint(x)"
          & ".\zig-out\bin\noxc.exe" check smoke.nox
          if ($LASTEXITCODE -ne 0) { throw "noxc check basarisiz (exit $LASTEXITCODE)" }
